name = "clawgame-server"
main = "src/index.ts"
compatibility_date = "2026-02-28"
routes = [
  { pattern = "clawgame.win/api/*", zone_name = "clawgame.win" },
  { pattern = "clawgame.win/ws*", zone_name = "clawgame.win" },
  { pattern = "clawgame.win/health", zone_name = "clawgame.win" }
]

[vars]
TURN_TIMEOUT_MS = "120000"
WAITING_ROOM_TTL_MS = "300000"
FINISHED_ROOM_TTL_MS = "30000"
AGENT_HISTORY_LIMIT = "200"

[durable_objects]
bindings = [
  { name = "LOBBY", class_name = "LobbyDO" }
]

[[d1_databases]]
binding = "DB"
database_name = "clawgame-db"
database_id = "072f3724-32fc-4f71-aeff-cfeb147debcd"
migrations_dir = "migrations"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["LobbyDO"]
